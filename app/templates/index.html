<!DOCTYPE html>
<html>

<head>

    <title>VoiceB2B Portal</title>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            href="/static/style.css">

</head>

<body>

<div class="container-fluid">

    <div class="row vh-100">

        <!-- LEFT -->

        <div class="col-md-3 border-end p-4">

            <h3>📞 VoiceB2B</h3>

            <hr>

            <label class="form-label">
                Customer Mobile
            </label>

            <input
                    id="phone"
                    class="form-control"
                    placeholder="+917010419665">

            <button
                    id="callBtn"
                    class="btn btn-primary mt-3 w-100">

                Start Call

            </button>

            <hr>

            <h6>Status</h6>

            <span id="status">
                Idle
            </span>

            <br><br>

            <h6>Call SID</h6>

            <span id="callSid">
                -
            </span>

        </div>

        <!-- RIGHT -->

        <div class="col-md-9 d-flex flex-column vh-100">

            <div class="p-3 border-bottom flex-shrink-0">
                <h4>Conversation</h4>
            </div>

            <div id="chatWindow" class="flex-grow-1 overflow-auto p-3">
            </div>

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>

</html>
